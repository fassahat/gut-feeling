services:
  db:
    image: postgres:17-alpine
    environment:
      POSTGRES_USER: gutfeeling
      POSTGRES_PASSWORD: gutfeeling
      POSTGRES_DB: gutfeeling
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./server/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U gutfeeling"]
      interval: 5s
      timeout: 5s
      retries: 5

  server:
    build: ./server
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: "postgresql+asyncpg://gutfeeling:gutfeeling@db:5432/gutfeeling"
    depends_on:
      db:
        condition: service_healthy

volumes:
  pgdata:
